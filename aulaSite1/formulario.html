<!DOCTYPE html>
<html>
    <head>
        <title>Formulários</title>
    </head>
    <body>
        <ul>
            <li>
                <a href="index.html">Home</a>
            </li>
            <li>
                <a href="listas.html">Listas</a>
            </li>
            <li>
                <a href="tabelas.html">Tabelas</a>
            </li>
            <li>
                <a href="img.html">Imagens</a>
            </li>
        </ul>
        <h2>Formulário</h2>
        <p>Essa página possui um resumo sobre os conceitos de formulários do HTML!</p>
        <form>
            <div>
                <label for="nome">Nome: </label>
                <input type="text">
            </div>

            <br>
            <div>
                <label for="idade">Idade: </label>
                <input type="number" min="0" max="110">
            </div>
            <br>

            <div>
                <label for="usuario">Usuário: </label>
                <input type="text">
            </div>
            <br>

            <div>
                <label for="senha">Senha: </label>
                <input type="password">
            </div>
            <br>

            <div>
                <label for="dataEvento">Data do Evento: </label>
                <input type="datetime-local">
            </div>
            <br>

            <div>
                <label for="">
                    Telefone:
                    <input type="tel" required placeholder="(XX)XXXXX-XXXX">
                </label>
            </div>
            <br>

            <div>
                <label for="email">
                    Email: <input type="email" required>
                </label>
            </div>
            <br>

            <div>
                <label for="peso">
                    Peso : <input type="number" min="0" max="200" step="0.5">
                </label>
            </div>
            <br>

            <div>
                <label for="volume">
                    Volume: <input type="range" min="0" max="100" step="10">
                </label>
            </div>
            <br>

            <div>
                <fieldset>
                    <legend>Estado Civil</legend>
                <p>
                    <label>
                        <input type="radio" name="est_civil" value="casado"> Casado
                    </label>
                </p>
                <p>
                    <label>
                        <input type="radio" name="est_civil" value="solteiro"> Solteiro
                    </label>
                </p>
                <p>
                    <label>
                        <input type="radio" name="est_civil" value="divorciado"> Divorciado 
                    </label>
                </p>
                </fieldset>

                <div>
                    <fieldset>
                        <legend>Produtos</legend>
                        <p>
                            <label>
                                <input type="checkbox" name="computador" value="computador"> Computador
                            </label>
                        </p>
                        <p>
                            <label>
                                <input type="checkbox" name="impressora" value="impressora"> Impressora
                            </label>
                        </p>
                        <p>
                            <label>
                                <input type="checkbox" name="monitor" value="monitor"> Monitor
                            </label>
                        </p>
                    </fieldset>
                </div>
            </div>
            <br>
            <div>
                <label>
                    Deixe sua sugestão:
                    <br>
                    <textarea cols="30" rows="5"></textarea>
                </label>
            </div>
<div></div>
            <div>
                <p>
                    <label>
                        Site: <input type="url" list="sites" name="link">
                    </label>
                </p>
                <datalist id="sites"> 
                    <option label="Youtube" value="https://www.youtube.com/"></option>

                    <option label="Compilador C" value="https://www.onlinegdb.com/online_c_compiler"></option>
 
                    <option label="Portal Unipam" value="https://portal.unipam.edu.br/login"></option>
                </datalist>
            </div>
            <br>


            <div>
                <p>
                    <label>
                        Carro:
                        <select name="carros" required>
                            <optgroup label="1_Esportivos"> <!--Tipo de seleção-->
                            <option value="1.1">Ferrari</option> <!---->
                            <option value="1.2">Porsche</option>
                            <option value="1.3">Lamborghini</option>

                            <optgroup label="2_Populares">
                            <option value="2.1">Gol</option>
                            <option value="2.2">Astra</option>
                            <option value="2.3">Corsa</option>
                            <option value="2.4">Uno</option>
                            </select>
                    </label>
                </p>
            </div>


            <button type="submit">Enviar</button>
        </form>
    </body>
</html>
