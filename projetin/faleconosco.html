<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoleyLab</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/faleconosco.css">
    
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-cor">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><img src="img/logo-header.png" alt="" width="140px"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav position-absolute top-0 start-50 translate-middle-x" /*Tudo depois de
                        navbar-nav é para ajustar os links no meio da tela* />
                    <a class="nav-link" href="index.html">Início</a>
                    <a class="nav-link" href="quemsomos.html">Quem Somos</a>
                    <a class="nav-link active" href="#">Fale Conosco</a>
                </div>
            </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="formulario">
            <form class="row g-3 needs-validation" novalidate>
                <div class="col-md-4">
                    <label for="validationCustom01" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="validationCustom01" placeholder="Adriel" required>
                    <div class="valid-feedback">
                        Parece bom!
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="validationCustom02" class="form-label">Sobrenome</label>
                    <input type="text" class="form-control" id="validationCustom02" placeholder="Germano" required>
                    <div class="valid-feedback">
                        Parece bom!
                    </div>
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Email</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1"
                        placeholder="name@example.com" required>
                </div>
                <div class="col-md-6">
                    <label for="validationCustom03" class="form-label">Cidade</label>
                    <input type="text" class="form-control" id="validationCustom03" placeholder="Patos de Minas"
                        required>
                    <div class="invalid-feedback">
                        Por favor digite uma cidade válida!
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="validationCustom04" class="form-label">Estado</label>
                    <select class="form-select" id="validationCustom04" required>
                        <option selected disabled value="">Escolha...</option>
                        <option>MG</option>
                        <option>SP</option>
                        <option>RJ</option>
                        <option>ES</option>
                        <option>MA</option>
                        <option>SC</option>
                        <option>RS</option>
                        <option>AM</option>
                        <option>MT</option>
                        <option>MS</option>
                        <option>DF</option>
                        <option>GO</option>
                        <option>AC</option>
                        <option>AL</option>
                        <option>BA</option>
                        <option>CE</option>
                        <option>PA</option>
                        <option>PB</option>
                        <option>PE</option>
                        <option>PI</option>
                        <option>RN</option>
                        <option>RS</option>
                        <option>RO</option>
                        <option>RR</option>
                        <option>SE</option>
                        <option>TO</option>
                    </select>
                    <div class="invalid-feedback">
                        Por favor coloque um estado válido.
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="validationCustom05" class="form-label">CEP</label>
                    <input type="text" class="form-control" id="validationCustom05" placeholder="38702054" required>
                    <div class="invalid-feedback">
                        Por favor coloque um CEP válido.
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-check condicao">
                        <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
                        <label class="form-check-label" for="invalidCheck">
                            Concordo com os termos e condições.
                        </label>
                        <div class="invalid-feedback">
                            Você deve concordar antes de enviar.
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlTextarea1" class="form-label">Descreva sua situação: </label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                </div>
                <div class="col-12">
                    <button class="btn btn-cor" type="submit">Enviar mensagem</button>
                </div>

            </form>
        </div>
    </main>

    <footer>
        <p>Copyright &copy; VoleyLab - 2026</p>
        <a href="faleconosco.html"><i class="bi bi-arrow-up-circle"></i></a>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
